# Hyprland Configuration
# Refer to the wiki for more information: https://wiki.hypr.land/0.54.0/Configuring/

# Copied from https://github.com/AvengeMedia/DankMaterialShell/tree/v1.4.6/core/internal/config/embedded/hyprland.conf on 2026-MAY-9.
# Modified according to what I understand is required or contributes to QoL.

# User configs and overrides are placed at the end of this file to make sure they take precedence.

# ==================
# USER VARIABLES    
# ==================
# Declare your commands and programs here as variables for easy use in keybindings and autostart.
$terminal = ghostty    # Or replace with your terminal of choice.
$terminalEditor = micro

# ==================
# MONITOR CONFIG
# ==================
monitor = , preferred,auto,auto

# ==================
# INPUT CONFIG
# ==================
input {
    kb_layout = us
    numlock_by_default = true
}

# ==================
# GENERAL LAYOUT
# ==================
general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2

    layout = dwindle
}

# ==================
# DECORATION
# ==================
decoration {
    rounding = 12

    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 30
        render_power = 5
        offset = 0 5
        color = rgba(00000070)
    }
}

# ==================
# ANIMATIONS
# ==================
animations {
    enabled = true

    animation = windowsIn, 1, 3, default
    animation = windowsOut, 1, 3, default
    animation = workspaces, 1, 5, default
    animation = windowsMove, 1, 4, default
    animation = fade, 1, 3, default
    animation = border, 1, 3, default
}

# ==================
# LAYOUTS
# ==================
dwindle {
    preserve_split = true
}

master {
    mfact = 0.5
    new_status = master
}

# ==================
# MISC
# ==================
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ==================
# KEYBINDS
# ==================
# Copied from https://github.com/AvengeMedia/DankMaterialShell/blob/master/core/internal/config/embedded/hypr-binds.conf on 2026-MAY-9.

# === Application Launchers ===
bind = SUPER, grave, exec, $terminal
bind = SUPER, space, exec, dms ipc call spotlight toggle
bind = SUPER, V, exec, dms ipc call clipboard toggle
bind = SUPER, comma, exec, dms ipc call settings focusOrToggle
bind = SUPER, N, exec, dms ipc call notifications toggle
bind = SUPER SHIFT, N, exec, dms ipc call notepad toggle
bind = SUPER, Y, exec, dms ipc call dankdash wallpaper
bind = SUPER, TAB, exec, dms ipc call hypr toggleOverview
bind = SUPER, X, exec, dms ipc call powermenu toggle

# === Cheat sheet
bind = SUPER SHIFT, Slash, exec, dms ipc call keybinds toggle hyprland

# === Security ===
bind = SUPER ALT, L, exec, dms ipc call lock lock
bind = SUPER SHIFT, escape, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = CTRL ALT, Delete, exec, dms ipc call processlist focusOrToggle

# === Audio Controls ===
bindel = , XF86AudioRaiseVolume, exec, dms ipc call audio increment 3
bindel = , XF86AudioLowerVolume, exec, dms ipc call audio decrement 3
bindl = , XF86AudioMute, exec, dms ipc call audio mute
bindl = , XF86AudioMicMute, exec, dms ipc call audio micmute
bindl = , XF86AudioPause, exec, dms ipc call mpris playPause
bindl = , XF86AudioPlay, exec, dms ipc call mpris playPause
bindl = , XF86AudioPrev, exec, dms ipc call mpris previous
bindl = , XF86AudioNext, exec, dms ipc call mpris next
bindel = CTRL, XF86AudioRaiseVolume, exec, dms ipc call mpris increment 3
bindel = CTRL, XF86AudioLowerVolume, exec, dms ipc call mpris decrement 3

# === Brightness Controls ===
bindel = , XF86MonBrightnessUp, exec, dms ipc call brightness increment 5 ""
bindel = , XF86MonBrightnessDown, exec, dms ipc call brightness decrement 5 ""

# === Window Management ===
bind = SUPER, escape, killactive
bind = SUPER, F, fullscreen, 1
bind = SUPER SHIFT, F, fullscreen, 0
bind = SUPER SHIFT, T, togglefloating
bind = SUPER, G, togglegroup
bind = SUPER SHIFT, G, exec, dms ipc call window-rules toggle

# === Focus Navigation ===
bind = SUPER, left, movefocus, l
bind = SUPER, down, movefocus, d
bind = SUPER, up, movefocus, u
bind = SUPER, right, movefocus, r
bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r
bind = SUPER, A, movefocus, l
bind = SUPER, S, movefocus, d
bind = SUPER, W, movefocus, u
bind = SUPER, D, movefocus, r

# === Window Movement ===
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, down, movewindow, d
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, J, movewindow, d
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, A, movewindow, l
bind = SUPER SHIFT, S, movewindow, d
bind = SUPER SHIFT, W, movewindow, u
bind = SUPER SHIFT, D, movewindow, r

# === Column Navigation ===
bind = SUPER, Home, focuswindow, first
bind = SUPER, End, focuswindow, last

# === Monitor Navigation ===
bind = SUPER CTRL, left, focusmonitor, l
bind = SUPER CTRL, right, focusmonitor, r
bind = SUPER CTRL, H, focusmonitor, l
bind = SUPER CTRL, J, focusmonitor, d
bind = SUPER CTRL, K, focusmonitor, u
bind = SUPER CTRL, L, focusmonitor, r
bind = SUPER CTRL, A, focusmonitor, l
bind = SUPER CTRL, S, focusmonitor, d
bind = SUPER CTRL, W, focusmonitor, u
bind = SUPER CTRL, D, focusmonitor, r

# === Move to Monitor ===
bind = SUPER SHIFT CTRL, left, movewindow, mon:l
bind = SUPER SHIFT CTRL, down, movewindow, mon:d
bind = SUPER SHIFT CTRL, up, movewindow, mon:u
bind = SUPER SHIFT CTRL, right, movewindow, mon:r
bind = SUPER SHIFT CTRL, H, movewindow, mon:l
bind = SUPER SHIFT CTRL, J, movewindow, mon:d
bind = SUPER SHIFT CTRL, K, movewindow, mon:u
bind = SUPER SHIFT CTRL, L, movewindow, mon:r
bind = SUPER SHIFT CTRL, A, movewindow, mon:l
bind = SUPER SHIFT CTRL, S, movewindow, mon:d
bind = SUPER SHIFT CTRL, W, movewindow, mon:u
bind = SUPER SHIFT CTRL, D, movewindow, mon:r

# === Workspace Navigation ===
bind = SUPER, Page_Down, workspace, e+1
bind = SUPER, Page_Up, workspace, e-1
bind = SUPER, U, workspace, e+1
bind = SUPER, I, workspace, e-1
bind = SUPER, E, workspace, e+1
bind = SUPER, Q, workspace, e-1

# === Workspace Management ===
bind = CTRL SHIFT, R, exec, dms ipc call workspace-rename open

# === Move Window to Workspace ===
bind = SUPER SHIFT, down, movetoworkspace, e+1
bind = SUPER SHIFT, up, movetoworkspace, e-1
bind = SUPER SHIFT, U, movetoworkspace, e+1
bind = SUPER SHIFT, I, movetoworkspace, e-1
bind = SUPER SHIFT, E, movetoworkspace, e+1
bind = SUPER SHIFT, Q, movetoworkspace, e-1

# === Mouse Wheel Navigation ===
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1
bind = SUPER CTRL, mouse_down, movetoworkspace, e+1
bind = SUPER CTRL, mouse_up, movetoworkspace, e-1

# === Numbered Workspaces ===
bind = SUPER, 1, workspace, 10
bind = SUPER, 2, workspace, 1
bind = SUPER, 3, workspace, 2
bind = SUPER, 4, workspace, 3
bind = SUPER, 5, workspace, 4
bind = SUPER, 6, workspace, 5
bind = SUPER, 7, workspace, 6
bind = SUPER, 8, workspace, 7
bind = SUPER, 9, workspace, 8
bind = SUPER, 0, workspace, 9

# === Move Window to Numbered Workspaces ===
bind = SUPER SHIFT, 1, movetoworkspace, 10
bind = SUPER SHIFT, 2, movetoworkspace, 1
bind = SUPER SHIFT, 3, movetoworkspace, 2
bind = SUPER SHIFT, 4, movetoworkspace, 3
bind = SUPER SHIFT, 5, movetoworkspace, 4
bind = SUPER SHIFT, 6, movetoworkspace, 5
bind = SUPER SHIFT, 7, movetoworkspace, 6
bind = SUPER SHIFT, 8, movetoworkspace, 7
bind = SUPER SHIFT, 9, movetoworkspace, 8
bind = SUPER SHIFT, 0, movetoworkspace, 9

# === Column Management ===
bind = SUPER, bracketleft, layoutmsg, preselect l
bind = SUPER, bracketright, layoutmsg, preselect r

# === Sizing & Layout ===
bind = SUPER, R, layoutmsg, togglesplit
bind = SUPER CTRL, F, resizeactive, exact 100% 100%

# === Move/resize windows with mainMod + LMB/RMB and dragging ===
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# === Move/resize windows with mainMod + LMB/RMB and dragging ===
bindd = SUPER, code:20, Expand window left, resizeactive, -100 0
bindd = SUPER, code:21, Shrink window left, resizeactive, 100 0

# === Manual Sizing ===
binde = SUPER, minus, resizeactive, -10% 0
binde = SUPER, equal, resizeactive, 10% 0
binde = SUPER SHIFT, minus, resizeactive, 0 -10%
binde = SUPER SHIFT, equal, resizeactive, 0 10%

# === Screenshots ===
bind = , Print, exec, dms screenshot
bind = CTRL, Print, exec, dms screenshot full
bind = ALT, Print, exec, dms screenshot window

# === System Controls ===
bind = SUPER SHIFT, P, dpms, toggle

# ==================
# WINDOW RULES
# ==================
windowrule = tile on, match:class ^(org\.wezfurlong\.wezterm)$

windowrule = rounding 12, match:class ^(org\.gnome\.)

windowrule = tile on, match:class ^(gnome-control-center)$
windowrule = tile on, match:class ^(pavucontrol)$
windowrule = tile on, match:class ^(nm-connection-editor)$

windowrule = float on, match:class ^(org\.gnome\.Calculator)$
windowrule = float on, match:class ^(gnome-calculator)$
windowrule = float on, match:class ^(galculator)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(org\.gnome\.Nautilus)$
windowrule = float on, match:class ^(xdg-desktop-portal)$

windowrule = no_initial_focus on, match:class ^(steam)$, match:title ^(notificationtoasts)
windowrule = pin on, match:class ^(steam)$, match:title ^(notificationtoasts)

windowrule = float on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(zoom)$

# DMS windows floating by default
# ! Hyprland doesn't size these windows correctly so disabling by default here
# windowrule = float on, match:class ^(org.quickshell)$

layerrule = no_anim on, match:namespace ^(quickshell)$
layerrule = no_anim on, match:namespace ^dms:.*

# Hyprland default windowrules
windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    # Hyprland-run windowrule
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# See https://wiki.hypr.land/0.54.0/Useful-Utilities/Screen-Sharing/#xwayland
windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus = true
    no_anim = true
    no_blur = true
    max_size = 1 1
    opacity = 0.0
}

# ==================
# ENVIRONMENT VARIABLES
# ==================
# From https://danklinux.com/docs/dankmaterialshell/compositors#environment-variables-1
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,gtk3
env = QT_QPA_PLATFORMTHEME_QT6,gtk3
env = ELECTRON_OZONE_PLATFORM_HINT,auto

env = TERMINAL, $terminal
env = TERM, $terminal
env = EDITOR,$terminalEditor
env = VISUAL,$terminalEditor

# ==================
# PERMISSIONS
# ==================
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly for security reasons

ecosystem {
  enforce_permissions = 1
}

# Permissions for screensharing.
permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow

# Uncomment the line below to enable Hyprland plugins.
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

# ==================
# DMS OVERRIDES
# ==================
# These are auto-generated by DMS -- do not edit manually. Instead, configure them via DMS.
source = ./dms/colors.conf
source = ./dms/outputs.conf
source = ./dms/layout.conf
source = ./dms/cursor.conf
source = ./dms/binds.conf

# ==================
# STARTUP APPS
# ==================
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY DISPLAY XDG_CURRENT_DESKTOP SSH_AUTH_SOCK
exec-once = bash ./scripts/restart-portals.sh    # See https://wiki.hypr.land/0.54.0/FAQ/#some-of-my-apps-take-a-really-long-time-to-open
exec-once = systemctl --user start hyprland-session.target
exec-once = bash -c "wl-paste --watch cliphist store &"    # For clipboard history; copied from https://danklinux.com/docs/dankmaterialshell/compositors#key-configuration-sections-1

# ==================
# USER OVERRIDES
# ==================
# This is where you can add your own custom configuration files to override the defaults. These will be loaded after all other configurations, allowing you to easily customize and tweak your setup without modifying the base config. Just add your custom config files here and they will be sourced in order.
# For example: `source = ./user/animation.conf`, `source = ./user/input.conf`, etc.
source = ./user/windowrules.conf